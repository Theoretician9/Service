<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'DejaVu Sans', sans-serif; font-size: 12px; line-height: 1.5; color: #333; margin: 40px; }
        h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 10px; }
        h2 { font-size: 16px; color: #2a2a2a; margin-top: 20px; }
        h3 { font-size: 14px; color: #3a3a3a; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f5f5f5; font-weight: bold; }
        .metric { color: #2563eb; font-weight: bold; }
        .warning { color: #dc2626; }
        .success { color: #16a34a; }
        ul { padding-left: 20px; }
        li { margin: 4px 0; }
        .footer { margin-top: 30px; font-size: 10px; color: #999; text-align: center; }
    </style>
</head>
<body>
{% block content %}{% endblock %}
<div class="footer">AI Marketplace Bot — сгенерировано автоматически</div>
</body>
</html>
